<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>中文框选朗读</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>中文框选朗读</h1>
        <span id="status" class="status status-off">未激活</span>
      </header>

      <button id="toggleBtn" class="btn btn-primary">开启框选朗读</button>
      <button id="subtitleBtn" class="btn btn-warning">视频字幕跟读</button>
      <button id="stopBtn" class="btn btn-secondary">停止朗读</button>

      <div class="section">
        <label class="row">
          <span>语速</span>
          <input type="range" id="rate" min="0.5" max="2" step="0.1" />
          <span id="rateVal" class="value">1.0</span>
        </label>
        <label class="row">
          <span>音调</span>
          <input type="range" id="pitch" min="0" max="2" step="0.1" />
          <span id="pitchVal" class="value">1.0</span>
        </label>
        <label class="row">
          <span>音量</span>
          <input type="range" id="volume" min="0" max="2" step="0.05" />
          <span id="volumeVal" class="value">1.0</span>
        </label>
        <label class="row">
          <span>声源</span>
          <select id="voice"></select>
        </label>
        <label class="row checkbox-row">
          <input type="checkbox" id="chineseOnly" />
          <span>仅朗读中文（过滤其他字符）</span>
        </label>
        <label class="row checkbox-row">
          <input type="checkbox" id="mediaBoost" />
          <span>音量 &gt; 100% 时同步放大网页视频/音频</span>
        </label>
      </div>

      <div class="section actions">
        <button id="optionsBtn" class="btn btn-ghost">更多设置</button>
      </div>

      <footer class="footer">
        <div>框选朗读：Alt+Shift+R　字幕跟读：Alt+Shift+V</div>
        <div>停止：Alt+Shift+S　退出：Esc</div>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
